<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>우리 동네 아파트 실거래가 대시보드</title>
    <!-- Tailwind CSS (스타일링) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Chart.js (차트 라이브러리) -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- PapaParse (CSV 파싱 라이브러리) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <!-- PptxGenJS (PPT 생성 라이브러리) -->
    <script src="https://cdn.jsdelivr.net/gh/gitbrent/PptxGenJS/dist/pptxgen.bundle.js"></script>
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        body { font-family: 'Pretendard', sans-serif; background-color: #f3f4f6; }
        .spinner {
            border: 4px solid rgba(0, 0, 0, 0.1);
            width: 36px; height: 36px; border-radius: 50%;
            border-left-color: #16a34a; /* 초록색 포인트 */
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="text-gray-800 antialiased p-4 md:p-8">

    <div class="max-w-7xl mx-auto">
        <!-- 헤더 영역 -->
        <header class="mb-8 flex flex-col md:flex-row justify-between items-start md:items-end border-b pb-4 border-gray-200 gap-4">
            <div>
                <h1 class="text-3xl font-bold text-gray-900">우리 동네 아파트 실거래가 대시보드</h1>
                <p class="text-sm text-gray-500 mt-2">안정적인 자산 관리를 위한 실거래가 모니터링 시스템</p>
            </div>
            <div class="flex items-center space-x-4">
                <div id="loadingStatus" class="flex items-center text-green-600 font-medium">
                    <div class="spinner mr-2"></div>
                    데이터 불러오는 중...
                </div>
                <!-- PPT 다운로드 버튼 (초기엔 숨김) -->
                <button id="downloadPptBtn" style="display: none;" class="bg-green-600 hover:bg-green-700 text-white px-5 py-2.5 rounded-lg text-sm font-semibold transition-colors flex items-center shadow-sm focus:outline-none focus:ring-2 focus:ring-green-500 focus:ring-offset-2">
                    <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
                    PPT로 다운로드
                </button>
            </div>
        </header>

        <!-- 필터 영역 (법정동 단일 필터로 단순화) -->
        <div class="mb-6 flex justify-end">
            <div class="flex items-center bg-white p-3 rounded-xl shadow-sm border border-gray-100">
                <label for="dongFilter" class="mr-3 font-semibold text-gray-700 text-sm">동네(법정동) 선택:</label>
                <select id="dongFilter" class="border border-gray-300 rounded-lg px-4 py-2 text-gray-700 focus:outline-none focus:ring-2 focus:ring-green-500 bg-gray-50 text-sm shadow-sm cursor-pointer min-w-[180px]">
                    <option value="전체">전체 (모든 동네)</option>
                </select>
            </div>
        </div>

        <!-- 요약 카드 영역 -->
        <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-8">
            <div class="bg-white rounded-xl shadow-sm p-6 border border-gray-100">
                <div class="flex justify-between items-center mb-1">
                    <h3 class="text-sm font-semibold text-gray-500">전체 거래 건수</h3>
                    <span class="text-xl" aria-hidden="true">🏠</span>
                </div>
                <p class="text-2xl font-bold text-gray-900" id="totalCount">-</p>
            </div>
            <div class="bg-white rounded-xl shadow-sm p-6 border border-gray-100">
                <div class="flex justify-between items-center mb-1">
                    <h3 class="text-sm font-semibold text-gray-500">평균 거래가격</h3>
                    <span class="text-xl" aria-hidden="true">💰</span>
                </div>
                <p class="text-2xl font-bold text-green-600" id="avgPrice">-</p>
            </div>
            <div class="bg-white rounded-xl shadow-sm p-6 border border-gray-100">
                <div class="flex justify-between items-center mb-1">
                    <h3 class="text-sm font-semibold text-gray-500">최고 거래가격</h3>
                    <span class="text-xl" aria-hidden="true">📈</span>
                </div>
                <p class="text-2xl font-bold text-red-500" id="maxPrice">-</p>
            </div>
            <div class="bg-white rounded-xl shadow-sm p-6 border border-gray-100">
                <div class="flex justify-between items-center mb-1">
                    <h3 class="text-sm font-semibold text-gray-500">최저 거래가격</h3>
                    <span class="text-xl" aria-hidden="true">📉</span>
                </div>
                <p class="text-2xl font-bold text-blue-500" id="minPrice">-</p> 
            </div>
        </div>

        <!-- 차트 영역 -->
        <div class="bg-white rounded-xl shadow-sm p-6 mb-8 border border-gray-100">
            <h2 class="text-lg font-bold text-gray-800 mb-4">월별 평균 거래가격 추이</h2>
            <div class="relative h-72 w-full">
                <!-- PPT 캡처 시 배경을 흰색으로 고정 -->
                <canvas id="monthlyChart" style="background-color: #ffffff;"></canvas>
            </div>
        </div>

        <!-- 테이블 영역 -->
        <div class="bg-white rounded-xl shadow-sm overflow-hidden border border-gray-100">
            <div class="p-6 border-b border-gray-100 bg-gray-50">
                <h2 class="text-lg font-bold text-gray-800">최근 거래 목록</h2>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-gray-50 text-gray-600 text-sm uppercase tracking-wider border-b border-gray-200">
                            <th class="p-4 font-semibold">거래일자</th>
                            <th class="p-4 font-semibold">아파트명</th>
                            <th class="p-4 font-semibold">법정동</th>
                            <th class="p-4 font-semibold">전용면적(㎡)</th>
                            <th class="p-4 font-semibold">층</th>
                            <th class="p-4 font-semibold text-right">거래금액(만원)</th>
                            <th class="p-4 font-semibold">건축년도</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody" class="text-sm text-gray-700 divide-y divide-gray-100">
                        <!-- 데이터 행이 동적으로 추가됩니다 -->
                    </tbody>
                </table>
            </div>
        </div>
        
        <footer class="mt-8 text-center text-sm text-gray-400 pb-8">
            &copy; 2026 TOL (Tree of Life) Dashboard System.
        </footer>
    </div>

    <script>
        const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSa_XKbEgqC9SnQG8y3Ol_rXQn5-eyr3PqnrNyB08eEKQB7EbK-9iop_dBEJsWBipz_L3_KhfUouSoE/pub?gid=492507536&single=true&output=csv';
        
        let chartInstance = null;
        let allData = []; // 전체 데이터를 보관할 전역 변수

        // 숫자 포맷 함수
        const formatNumber = (num) => new Intl.NumberFormat('ko-KR').format(num);

        // 거래일자에서 'YYYY-MM' 형식 추출 함수
        const extractMonth = (dateStr) => {
            if (!dateStr) return '알수없음';
            const digits = dateStr.replace(/[^0-9]/g, '');
            if (digits.length >= 6) {
                return `${digits.substring(0, 4)}-${digits.substring(4, 6)}`;
            }
            return dateStr;
        };

        // 데이터 파싱 및 초기화
        async function initDashboard() {
            try {
                const response = await fetch(CSV_URL);
                if (!response.ok) throw new Error('데이터를 불러오는데 실패했습니다.');
                
                const csvText = await response.text();
                
                Papa.parse(csvText, {
                    header: true,
                    skipEmptyLines: true,
                    complete: function(results) {
                        allData = results.data;
                        
                        populateDongDropdown(allData); // 법정동 단일 필터 생성
                        processData(allData, '전체'); // 초기 데이터 렌더링
                        
                        // 데이터 로드 완료 후 로딩바 숨기고 PPT 다운로드 버튼 표시
                        document.getElementById('loadingStatus').style.display = 'none';
                        document.getElementById('downloadPptBtn').style.display = 'flex';
                    },
                    error: function(error) {
                        console.error('파싱 에러:', error);
                        document.getElementById('loadingStatus').innerHTML = '<span class="text-red-500">데이터 파싱 오류</span>';
                    }
                });
            } catch (error) {
                console.error('네트워크 에러:', error);
                document.getElementById('loadingStatus').innerHTML = '<span class="text-red-500">네트워크 오류 발생</span>';
            }
        }

        // 법정동 드롭다운 생성 및 이벤트 연결
        function populateDongDropdown(data) {
            const dongSelect = document.getElementById('dongFilter');
            const dongs = new Set();
            
            data.forEach(row => {
                const dong = row['법정동'];
                if (dong && dong.trim() !== '') {
                    dongs.add(dong.trim());
                }
            });

            // 가나다순 정렬하여 옵션 추가
            Array.from(dongs).sort().forEach(dong => {
                const option = document.createElement('option');
                option.value = dong;
                option.textContent = dong;
                dongSelect.appendChild(option);
            });

            // 동네 변경 시 해당 동네만 필터링하여 데이터 재가공
            dongSelect.addEventListener('change', (e) => {
                processData(allData, e.target.value);
            });
        }

        // 데이터 가공 및 UI 업데이트 (법정동 필터만 적용)
        function processData(data, selectedDong) {
            let totalCount = 0;
            let sumPrice = 0;
            let maxPrice = 0;
            let minPrice = Infinity;
            
            const monthlyData = {};
            const cleanData = [];

            // 선택된 법정동이 있으면 해당 데이터만 추출
            const targetData = selectedDong === '전체' 
                ? data 
                : data.filter(row => row['법정동'] && row['법정동'].trim() === selectedDong);

            targetData.forEach(row => {
                const priceStr = row['거래금액(만원)'] || '0';
                const price = parseInt(priceStr.replace(/,/g, ''), 10);
                
                if (isNaN(price) || price === 0) return;

                const month = extractMonth(row['거래일자']);
                
                totalCount++;
                sumPrice += price;
                if (price > maxPrice) maxPrice = price;
                if (price < minPrice) minPrice = price;

                if (!monthlyData[month]) {
                    monthlyData[month] = { sum: 0, count: 0 };
                }
                monthlyData[month].sum += price;
                monthlyData[month].count++;

                cleanData.push({ ...row, price, month });
            });

            if (totalCount === 0) minPrice = 0;
            
            const avgPrice = totalCount > 0 ? Math.round(sumPrice / totalCount) : 0;

            // 요약 카드 텍스트 업데이트
            document.getElementById('totalCount').textContent = `${formatNumber(totalCount)}건`;
            document.getElementById('avgPrice').textContent = `${formatNumber(avgPrice)}만원`;
            document.getElementById('maxPrice').textContent = `${formatNumber(maxPrice)}만원`;
            document.getElementById('minPrice').textContent = `${formatNumber(minPrice)}만원`;

            // 차트 및 테이블 렌더링
            renderChart(monthlyData);
            renderTable(cleanData.reverse()); 
        }

        // 차트 렌더링 함수
        function renderChart(monthlyData) {
            const ctx = document.getElementById('monthlyChart').getContext('2d');
            const sortedMonths = Object.keys(monthlyData).sort();
            const labels = sortedMonths;
            const dataPoints = sortedMonths.map(month => {
                return Math.round(monthlyData[month].sum / monthlyData[month].count);
            });

            if (chartInstance) {
                chartInstance.destroy();
            }

            chartInstance = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: '월별 평균 거래가격 (만원)',
                        data: dataPoints,
                        borderColor: '#16a34a',
                        backgroundColor: 'rgba(22, 163, 74, 0.1)',
                        borderWidth: 2,
                        pointBackgroundColor: '#ffffff',
                        pointBorderColor: '#16a34a',
                        pointBorderWidth: 2,
                        pointRadius: 4,
                        fill: true,
                        tension: 0.3
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    animation: {
                        duration: 0 // PPT 캡처 시 애니메이션 렌더링 충돌 방지
                    },
                    plugins: {
                        legend: { display: false },
                        tooltip: {
                            callbacks: {
                                label: function(context) {
                                    return formatNumber(context.raw) + ' 만원';
                                }
                            }
                        }
                    },
                    scales: {
                        y: {
                            beginAtZero: false,
                            ticks: {
                                callback: function(value) {
                                    return formatNumber(value);
                                }
                            },
                            grid: { borderDash: [4, 4], color: '#e5e7eb' }
                        },
                        x: {
                            grid: { display: false }
                        }
                    }
                }
            });
        }

        // 테이블 렌더링 함수
        function renderTable(data) {
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = '';

            const displayData = data.slice(0, 100); 

            displayData.forEach(row => {
                const tr = document.createElement('tr');
                tr.className = 'bg-white even:bg-gray-50 hover:bg-green-50 transition-colors duration-150 cursor-pointer'; 
                
                // 5억(50,000만원) 이상이면 빨간색 강조
                const priceClass = row.price >= 50000 ? 'text-red-500 font-bold' : 'text-green-600 font-semibold';

                tr.innerHTML = `
                    <td class="p-4 whitespace-nowrap">${row['거래일자'] || '-'}</td>
                    <td class="p-4 font-medium text-gray-900">${row['아파트명'] || '-'}</td>
                    <td class="p-4">${row['법정동'] || '-'}</td>
                    <td class="p-4">${row['전용면적(㎡)'] || '-'}</td>
                    <td class="p-4">${row['층'] || '-'}</td>
                    <td class="p-4 text-right ${priceClass}">${formatNumber(row.price)}</td>
                    <td class="p-4">${row['건축년도'] || '-'}</td>
                `;
                tbody.appendChild(tr);
            });
        }

        // ================= PPT 다운로드 기능 =================
        document.getElementById('downloadPptBtn').addEventListener('click', async () => {
            const btn = document.getElementById('downloadPptBtn');
            const originalHTML = btn.innerHTML;
            
            // 로딩 상태 UI 처리
            btn.innerHTML = `
                <div class="spinner mr-2" style="width: 20px; height: 20px; border-width: 2px; border-left-color: #fff;"></div>
                생성 중...
            `;
            btn.disabled = true;

            try {
                let pptx = new PptxGenJS();
                pptx.layout = 'LAYOUT_16x9';

                let slide = pptx.addSlide();
                slide.background = { color: "F3F4F6" };

                // PPT 제목
                slide.addText('우리 동네 아파트 실거래가 모니터링 리포트', { 
                    x: 0.5, y: 0.5, w: '90%', h: 0.6, 
                    fontSize: 24, bold: true, color: '1F2937' 
                });

                // 적용된 필터(법정동) 텍스트
                const dong = document.getElementById('dongFilter').value;
                const filterText = dong !== '전체' ? `필터 기준: 법정동(${dong})` : `필터 기준: 전체 데이터`;

                slide.addText(filterText, { 
                    x: 0.5, y: 1.1, w: '90%', h: 0.3, 
                    fontSize: 12, color: '6B7280' 
                });

                // 카드 데이터 가져오기
                const totalCount = document.getElementById('totalCount').innerText;
                const avgPrice = document.getElementById('avgPrice').innerText;
                const maxPrice = document.getElementById('maxPrice').innerText;
                const minPrice = document.getElementById('minPrice').innerText;

                // 요약 카드 PPT 렌더링
                const boxY = 1.7;
                slide.addShape(pptx.ShapeType.rect, { x: 0.5, y: boxY, w: 2.2, h: 1, fill: { color: "FFFFFF" }, line: { color: "E5E7EB", width: 1 } });
                slide.addText('🏠 전체 거래 건수', { x: 0.5, y: boxY + 0.1, w: 2.2, h: 0.3, fontSize: 10, color: '6B7280', align: 'center' });
                slide.addText(totalCount, { x: 0.5, y: boxY + 0.5, w: 2.2, h: 0.4, fontSize: 18, bold: true, color: '111827', align: 'center' });

                slide.addShape(pptx.ShapeType.rect, { x: 2.9, y: boxY, w: 2.2, h: 1, fill: { color: "FFFFFF" }, line: { color: "E5E7EB", width: 1 } });
                slide.addText('💰 평균 거래가격', { x: 2.9, y: boxY + 0.1, w: 2.2, h: 0.3, fontSize: 10, color: '6B7280', align: 'center' });
                slide.addText(avgPrice, { x: 2.9, y: boxY + 0.5, w: 2.2, h: 0.4, fontSize: 18, bold: true, color: '16A34A', align: 'center' });

                slide.addShape(pptx.ShapeType.rect, { x: 5.3, y: boxY, w: 2.2, h: 1, fill: { color: "FFFFFF" }, line: { color: "E5E7EB", width: 1 } });
                slide.addText('📈 최고 거래가격', { x: 5.3, y: boxY + 0.1, w: 2.2, h: 0.3, fontSize: 10, color: '6B7280', align: 'center' });
                slide.addText(maxPrice, { x: 5.3, y: boxY + 0.5, w: 2.2, h: 0.4, fontSize: 18, bold: true, color: 'EF4444', align: 'center' });

                slide.addShape(pptx.ShapeType.rect, { x: 7.7, y: boxY, w: 2.2, h: 1, fill: { color: "FFFFFF" }, line: { color: "E5E7EB", width: 1 } });
                slide.addText('📉 최저 거래가격', { x: 7.7, y: boxY + 0.1, w: 2.2, h: 0.3, fontSize: 10, color: '6B7280', align: 'center' });
                slide.addText(minPrice, { x: 7.7, y: boxY + 0.5, w: 2.2, h: 0.4, fontSize: 18, bold: true, color: '3B82F6', align: 'center' });

                // 차트 이미지 캡처
                if (chartInstance) {
                    const chartImage = chartInstance.toBase64Image();
                    slide.addShape(pptx.ShapeType.rect, { x: 0.5, y: 3.0, w: 9.4, h: 4.0, fill: { color: "FFFFFF" }, line: { color: "E5E7EB", width: 1 } });
                    slide.addText('월별 평균 거래가격 추이', { x: 0.7, y: 3.2, w: '80%', h: 0.3, fontSize: 12, bold: true, color: '374151' });
                    slide.addImage({ data: chartImage, x: 0.7, y: 3.6, w: 9.0, h: 3.2 });
                }

                const today = new Date().toISOString().slice(0, 10).replace(/-/g, '');
                const fileName = `TOL_실거래가_리포트_${today}.pptx`;
                await pptx.writeFile({ fileName: fileName });

            } catch (error) {
                console.error("PPT 생성 오류:", error);
                alert("PPT 다운로드 중 오류가 발생했습니다.");
            } finally {
                btn.innerHTML = originalHTML;
                btn.disabled = false;
            }
        });

        // 페이지 로드 시 실행
        document.addEventListener('DOMContentLoaded', initDashboard);

    </script>
</body>
</html>
```
