<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>우리 동네 아파트 실거래가 대시보드</title>
    <!-- Tailwind CSS (스타일링) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Chart.js (차트 라이브러리) -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- PapaParse (CSV 파싱 라이브러리) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        body { font-family: 'Pretendard', sans-serif; background-color: #f3f4f6; }
        .spinner {
            border: 4px solid rgba(0, 0, 0, 0.1);
            width: 36px; height: 36px; border-radius: 50%;
            border-left-color: #16a34a; /* 초록색 포인트 */
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="text-gray-800 antialiased p-4 md:p-8">

    <div class="max-w-7xl mx-auto">
        <!-- 헤더 영역 -->
        <header class="mb-8 flex justify-between items-end border-b pb-4 border-gray-200">
            <div>
                <h1 class="text-3xl font-bold text-gray-900">우리 동네 아파트 실거래가 대시보드</h1>
                <p class="text-sm text-gray-500 mt-2">안정적인 자산 관리를 위한 실거래가 모니터링 시스템</p>
            </div>
            <div id="loadingStatus" class="flex items-center text-green-600 font-medium">
                <div class="spinner mr-2"></div>
                데이터 불러오는 중...
            </div>
        </header>

        <!-- 요약 카드 영역 -->
        <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-8">
            <div class="bg-white rounded-xl shadow-sm p-6 border border-gray-100">
                <h3 class="text-sm font-semibold text-gray-500 mb-1">전체 거래 건수</h3>
                <p class="text-2xl font-bold text-gray-900" id="totalCount">-</p>
            </div>
            <div class="bg-white rounded-xl shadow-sm p-6 border border-gray-100">
                <h3 class="text-sm font-semibold text-gray-500 mb-1">평균 거래가격</h3>
                <p class="text-2xl font-bold text-green-600" id="avgPrice">-</p>
            </div>
            <div class="bg-white rounded-xl shadow-sm p-6 border border-gray-100">
                <h3 class="text-sm font-semibold text-gray-500 mb-1">최고 거래가격</h3>
                <p class="text-2xl font-bold text-red-500" id="maxPrice">-</p>
            </div>
            <div class="bg-white rounded-xl shadow-sm p-6 border border-gray-100">
                <h3 class="text-sm font-semibold text-gray-500 mb-1">최저 거래가격</h3>
                <!-- 테마 색상과 구분되도록 파란색으로 변경 -->
                <p class="text-2xl font-bold text-blue-500" id="minPrice">-</p> 
            </div>
        </div>

        <!-- 차트 영역 -->
        <div class="bg-white rounded-xl shadow-sm p-6 mb-8 border border-gray-100">
            <h2 class="text-lg font-bold text-gray-800 mb-4">월별 평균 거래가격 추이</h2>
            <div class="relative h-72 w-full">
                <canvas id="monthlyChart"></canvas>
            </div>
        </div>

        <!-- 테이블 영역 -->
        <div class="bg-white rounded-xl shadow-sm overflow-hidden border border-gray-100">
            <div class="p-6 border-b border-gray-100 bg-gray-50">
                <h2 class="text-lg font-bold text-gray-800">최근 거래 목록</h2>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-gray-50 text-gray-600 text-sm uppercase tracking-wider border-b border-gray-200">
                            <th class="p-4 font-semibold">거래일자</th>
                            <th class="p-4 font-semibold">아파트명</th>
                            <th class="p-4 font-semibold">법정동</th>
                            <th class="p-4 font-semibold">전용면적(㎡)</th>
                            <th class="p-4 font-semibold">층</th>
                            <th class="p-4 font-semibold text-right">거래금액(만원)</th>
                            <th class="p-4 font-semibold">건축년도</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody" class="text-sm text-gray-700 divide-y divide-gray-100">
                        <!-- 데이터 행이 동적으로 추가됩니다 -->
                    </tbody>
                </table>
            </div>
        </div>
        
        <footer class="mt-8 text-center text-sm text-gray-400 pb-8">
            &copy; 2026 TOL (Tree of Life) Dashboard System.
        </footer>
    </div>

    <script>
        const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSa_XKbEgqC9SnQG8y3Ol_rXQn5-eyr3PqnrNyB08eEKQB7EbK-9iop_dBEJsWBipz_L3_KhfUouSoE/pub?gid=492507536&single=true&output=csv';
        
        let chartInstance = null;

        // 숫자 포맷 함수 (예: 10,000)
        const formatNumber = (num) => new Intl.NumberFormat('ko-KR').format(num);

        // 거래일자에서 'YYYY-MM' 형식 추출 함수
        const extractMonth = (dateStr) => {
            if (!dateStr) return '알수없음';
            const digits = dateStr.replace(/[^0-9]/g, '');
            if (digits.length >= 6) {
                return `${digits.substring(0, 4)}-${digits.substring(4, 6)}`;
            }
            return dateStr;
        };

        // 데이터 파싱 및 초기화
        async function initDashboard() {
            try {
                const response = await fetch(CSV_URL);
                if (!response.ok) throw new Error('데이터를 불러오는데 실패했습니다.');
                
                const csvText = await response.text();
                
                Papa.parse(csvText, {
                    header: true,
                    skipEmptyLines: true,
                    complete: function(results) {
                        processData(results.data);
                        document.getElementById('loadingStatus').style.display = 'none';
                    },
                    error: function(error) {
                        console.error('파싱 에러:', error);
                        document.getElementById('loadingStatus').innerHTML = '<span class="text-red-500">데이터 파싱 오류</span>';
                    }
                });
            } catch (error) {
                console.error('네트워크 에러:', error);
                document.getElementById('loadingStatus').innerHTML = '<span class="text-red-500">네트워크 오류 발생</span>';
            }
        }

        // 데이터 가공 및 UI 업데이트
        function processData(data) {
            let totalCount = 0;
            let sumPrice = 0;
            let maxPrice = 0;
            let minPrice = Infinity;
            
            const monthlyData = {};
            const cleanData = [];

            data.forEach(row => {
                // 가격 데이터 정제
                const priceStr = row['거래금액(만원)'] || '0';
                const price = parseInt(priceStr.replace(/,/g, ''), 10);
                
                if (isNaN(price) || price === 0) return; // 유효하지 않은 데이터 건너뛰기

                const month = extractMonth(row['거래일자']);
                
                // 요약 통계 계산
                totalCount++;
                sumPrice += price;
                if (price > maxPrice) maxPrice = price;
                if (price < minPrice) minPrice = price;

                // 월별 데이터 집계
                if (!monthlyData[month]) {
                    monthlyData[month] = { sum: 0, count: 0 };
                }
                monthlyData[month].sum += price;
                monthlyData[month].count++;

                // 테이블용 데이터 보관
                cleanData.push({ ...row, price, month });
            });

            // 예외 처리: 데이터가 없을 경우
            if (totalCount === 0) minPrice = 0;
            
            const avgPrice = Math.round(sumPrice / totalCount);

            // 1. 요약 카드 업데이트
            document.getElementById('totalCount').textContent = `${formatNumber(totalCount)}건`;
            document.getElementById('avgPrice').textContent = `${formatNumber(avgPrice)}만원`;
            document.getElementById('maxPrice').textContent = `${formatNumber(maxPrice)}만원`;
            document.getElementById('minPrice').textContent = `${formatNumber(minPrice)}만원`;

            // 2. 차트 렌더링
            renderChart(monthlyData);

            // 3. 테이블 렌더링 (최근 거래일자 순 정렬을 위해 원본 유지 혹은 정렬)
            renderTable(cleanData.reverse()); 
        }

        function renderChart(monthlyData) {
            const ctx = document.getElementById('monthlyChart').getContext('2d');
            
            // 월별 정렬
            const sortedMonths = Object.keys(monthlyData).sort();
            const labels = sortedMonths;
            const dataPoints = sortedMonths.map(month => {
                return Math.round(monthlyData[month].sum / monthlyData[month].count);
            });

            if (chartInstance) {
                chartInstance.destroy(); // 기존 차트가 있으면 제거
            }

            chartInstance = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: '월별 평균 거래가격 (만원)',
                        data: dataPoints,
                        borderColor: '#16a34a', // 초록색 선
                        backgroundColor: 'rgba(22, 163, 74, 0.1)', // 초록색 배경
                        borderWidth: 2,
                        pointBackgroundColor: '#ffffff',
                        pointBorderColor: '#16a34a',
                        pointBorderWidth: 2,
                        pointRadius: 4,
                        fill: true,
                        tension: 0.3
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { display: false },
                        tooltip: {
                            callbacks: {
                                label: function(context) {
                                    return formatNumber(context.raw) + ' 만원';
                                }
                            }
                        }
                    },
                    scales: {
                        y: {
                            beginAtZero: false,
                            ticks: {
                                callback: function(value) {
                                    return formatNumber(value);
                                }
                            },
                            grid: { borderDash: [4, 4], color: '#e5e7eb' }
                        },
                        x: {
                            grid: { display: false }
                        }
                    }
                }
            });
        }

        function renderTable(data) {
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = ''; // 초기화

            const displayData = data.slice(0, 100); 

            displayData.forEach(row => {
                const tr = document.createElement('tr');
                tr.className = 'hover:bg-green-50 transition-colors duration-150'; // Hover 시 초록색 배경
                
                tr.innerHTML = `
                    <td class="p-4 whitespace-nowrap">${row['거래일자'] || '-'}</td>
                    <td class="p-4 font-medium text-gray-900">${row['아파트명'] || '-'}</td>
                    <td class="p-4">${row['법정동'] || '-'}</td>
                    <td class="p-4">${row['전용면적(㎡)'] || '-'}</td>
                    <td class="p-4">${row['층'] || '-'}</td>
                    <td class="p-4 text-right font-semibold text-green-600">${formatNumber(row.price)}</td> <!-- 가격 텍스트 초록색 -->
                    <td class="p-4">${row['건축년도'] || '-'}</td>
                `;
                tbody.appendChild(tr);
            });
        }

        // 페이지 로드 시 실행
        document.addEventListener('DOMContentLoaded', initDashboard);

    </script>
</body>
</html>
